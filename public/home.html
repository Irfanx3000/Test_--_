<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | TechStore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="logo">TechStore</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a id="adminLink" onclick="openAdminPanel()">Admin Panel</a>
            <a class="logout-btn" onclick="logout()">Logout</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Future Tech, Today</h1>
        <p>Your one-stop destination for the latest gadgets and electronics.</p>
        <button class="primary-btn" style="width: auto; padding: 10px 30px;">Explore Collection</button>
    </header>

    <div id="adminModal" class="admin-modal">
        <div class="admin-content">
            <div class="close-btn" onclick="closeAdminPanel()">✕</div>
            <h2>Admin Dashboard</h2>
            <hr><br>
            
            <div class="stat-card">
                <h3 id="totalUsers">0</h3>
                <p>Total Registered Accounts</p>
            </div>

            <h3>User Credentials List</h3>
            <div class="admin-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Joined Date</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <section class="products">
        <h2 class="section-title">Featured Products</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=400" alt="Watch">
                <h3>Smart Watch Elite</h3>
                <p class="price">$249.00</p>
                <button class="login-btn" style="width: 80%; margin: 10px auto; cursor: pointer;">Buy Now</button>
            </div>
            </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
